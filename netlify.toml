## Netlify configuration for Quarto site
## The Quarto build outputs the static site to the `_site/` directory.
[build]
publish = "_site"

## Quarto plugin: handles installing Quarto and building the project
[[plugins]]
package = "@quarto/netlify-plugin-quarto"

## Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://speakerdeck.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https: data:; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://speakerdeck.com; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://region1.google-analytics.com"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

## Cache headers for static assets
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

## Lighthouse plugin: generates a Lighthouse report after build
[[plugins]]
package = "@netlify/plugin-lighthouse"
	[plugins.inputs]
	# Deploy the lighthouse report to this path under your published site
	output_path = "reports/lighthouse.html"
